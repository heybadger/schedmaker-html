        <h2 class="splash-title">Welcome po! 🎀</h2>
        <p class="splash-sub">Tara, let's make your sched po</p>
      </div>
    </div>

    <div class="container" id="scheduleContainer">
      <div class="header-section">
        <div class="header-main">
          BADGER <span>CLASS SCHED</span> MAKER</h1>
        </div>

        <div class="title-row">
          <div class="title-input-wrapper">
            <label for="scheduleTitle">Title</label>
            <input type="text" id="scheduleTitle" placeholder="INPUT" />
          </div>
        </div>

        <div class="header-sub">
          <div class="subhead">
            Gawa ka napo sched mo with the tools/options sa baba
          </div>
        </div>
      </div>

      <div class="beginner-tip" id="beginnerTip">
        <span class="tip-icon">💡</span>
        <span class="tip-text"
          ><strong>Quick start:</strong> Lagay mo lang po course name, tas select ka days, set
          ka time, and click mo <strong>Add Course</strong></span
        >
      </div>

      <div class="toolbar">
        <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
        <button class="btn btn-primary" id="exportBtn">Export</button>
        <label class="file-input-label" for="importInput">Import</label>
        <input type="file" id="importInput" accept=".json" />
        <span class="spacer"></span>
        <span class="toolbar-hint">Click × to remove a course</span>
      </div>

      <div class="entry-panel" id="entryForm">
        <div class="field" style="flex: 2">
          <label for="courseName">Course Name</label>
          <input
            type="text"
            id="courseName"
            placeholder="Course Name"
            value=""
          />
        </div>
        <div class="field field-days">
          <label>Days</label>
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Mon" /> Mon</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Tue" /> Tue</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Wed" /> Wed</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Thu" /> Thu</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Fri" /> Fri</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Sat" /> Sat</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Sun" /> Sun</label
          >
        </div>
        <div class="field" style="flex: 0.8">
          <label for="startTime">Start</label>
          <input type="time" id="startTime" value="08:00" />
        </div>
        <div class="field" style="flex: 0.8">
          <label for="endTime">End</label>
          <input type="time" id="endTime" value="09:00" />
        </div>
        <button class="btn-add" id="addBtn">Add Course</button>
      </div>

      <div class="schedule-wrapper" id="scheduleWrapper">
        <div class="schedule-grid" id="scheduleGrid"></div>
      </div>

      <div class="image-options" id="imageOptions">
        <div class="option-group">
          <label for="decoStyle">Decoration</label>
          <select id="decoStyle">
            <option value="none">None</option>
            <option value="🌸" selected>🌸 Flower</option>
            <option value="🎀">🎀 Ribbon</option>
            <option value="✨">✨ Sparkle</option>
            <option value="💐">💐 Bouquet</option>
            <option value="🌷">🌷 Tulip</option>
            <option value="🌈">🌈 Rainbow</option>
            <option value="⭐">⭐ Star</option>
            <option value="🌙">🌙 Moon</option>
            <option value="🍀">🍀 Clover</option>
            <option value="🦋">🦋 Butterfly</option>
            <option value="🐱">🐱 Kitty</option>
            <option value="🎵">🎵 Music</option>
            <option value="📚">📚 Books</option>
          </select>
        </div>
        <div class="option-group">
          <label for="decoPosition">Position</label>
          <select id="decoPosition">
            <option value="top-right" selected>Top Right</option>
            <option value="top-left">Top Left</option>
            <option value="bottom-right">Bottom Right</option>
            <option value="bottom-left">Bottom Left</option>
            <option value="center">Center (Watermark)</option>
          </select>
        </div>
        <div class="option-group">
          <label for="customDeco">Custom</label>
          <input
            type="text"
            id="customDeco"
            placeholder="Add your own"
            maxlength="5"
          />
          <span class="deco-preview" id="decoPreview">🌸</span>
        </div>
      </div>

      <div class="footer-actions">
        <button class="btn btn-image" id="imageBtn">Save as Image</button>
        <button class="btn btn-print" id="printBtn">Print</button>
      </div>
    </div>

    <div class="site-footer">
      <span>badger.exe</span>
    </div>

    <script src="script.js"></script>
  </body>
</html>

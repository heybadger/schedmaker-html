<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>badger.exe</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  </head>
  <body>
    <div class="splash-screen" id="splashScreen">
      <div class="splash-content">
        <div class="hello-kitty">
          <img
            src="media/Aye_SIR_-removebg-preview.png"
            alt="Hello Kitty"
            class="kitty-img"
          />
        </div>
        <h2 class="splash-title">Welcome po! 🎀</h2>
        <p class="splash-sub">Walaaa, Class sched maker molang HAHAHA</p>
      </div>
    </div>

    <div class="container" id="scheduleContainer">
      <div class="header-section">
        <div class="header-main">
          <h1>Nica's <span>Class Sched</span> Maker</h1>
        </div>
        <div class="title-row">
          <div class="title-input-wrapper">
            <label for="scheduleTitle">Title</label>
            <input
              type="text"
              id="scheduleTitle"
              placeholder="CLASS SCHED NAME HERE PO"
            />
          </div>
        </div>
        <div class="header-sub">
          <div class="subhead">
            Gawa ka napo sched mo with the tools/options sa baba
          </div>
        </div>
      </div>

      <div class="beginner-tip" id="beginnerTip">
        <span class="tip-icon">💡</span>
        <span class="tip-text"
          ><strong>Quick start:</strong> Ilagay mo lang po the name ng subject,
          pick the araw at oras, tapos click mo po
          <strong>Add Course</strong></span
        >
      </div>

      <div class="toolbar">
        <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
        <button class="btn btn-primary" id="exportBtn">Export</button>
        <label class="file-input-label" for="importInput">Import</label>
        <input type="file" id="importInput" accept=".json" />
        <span class="spacer"></span>
        <span class="toolbar-hint">Click × to remove a course</span>
      </div>

      <div class="entry-panel" id="entryForm">
        <div class="field" style="flex: 1.4">
          <label for="courseName">Course Name</label>
          <input
            type="text"
            id="courseName"
            placeholder="Course Name"
            value=""
          />
        </div>
        <div class="field" style="flex: 1.2">
          <label for="profName">Professor</label>
          <input type="text" id="profName" placeholder="Prof's name" value="" />
        </div>
        <div class="field" style="flex: 0.8">
          <label for="roomName">Room #</label>
          <input type="text" id="roomName" placeholder="Room #" value="" />
        </div>
        <div class="field" style="flex: 0.8">
          <label for="buildingName">Building #</label>
          <input
            type="text"
            id="buildingName"
            placeholder="Building #"
            value=""
          />
        </div>
        <div class="field field-days">
          <label>Days</label>
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Mon" /> Mon</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Tue" /> Tue</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Wed" /> Wed</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Thu" /> Thu</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Fri" /> Fri</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Sat" /> Sat</label
          >
          <label class="day-check"
            ><input type="checkbox" class="day-cb" value="Sun" /> Sun</label
          >
        </div>
        <div class="field" style="flex: 0.8">
          <label for="startTime">Start</label>
          <input type="time" id="startTime" value="08:00" />
        </div>
        <div class="field" style="flex: 0.8">
          <label for="endTime">End</label>
          <input type="time" id="endTime" value="09:00" />
        </div>
        <button class="btn-add" id="addBtn">Add Course</button>
      </div>

      <div class="schedule-wrapper" id="scheduleWrapper">
        <div class="schedule-grid" id="scheduleGrid"></div>
      </div>

      <div class="image-options" id="imageOptions">
        <div class="img-upload-group">
          <div class="image-selector">
            <label>Image 1 - Top Right</label>
            <select id="bgImage1" class="bg-image-select">
              <option value="none">None</option>
              <option value="media/bg1.png">Background 1</option>
              <option value="media/bg2.png">Background 2</option>
              <option value="media/bg3.png">Background 3</option>
              <option value="media/bg4.png">Background 4</option>
              <option value="media/bg5.png">Background 5</option>
            </select>
          </div>
          <div class="image-selector">
            <label>Image 2 - Top Left</label>
            <select id="bgImage2" class="bg-image-select">
              <option value="none">None</option>
              <option value="media/bg1.png">Background 1</option>
              <option value="media/bg2.png">Background 2</option>
              <option value="media/bg3.png">Background 3</option>
              <option value="media/bg4.png">Background 4</option>
              <option value="media/bg5.png">Background 5</option>
            </select>
          </div>
          <div class="image-selector">
            <label>Image 3 - Center</label>
            <select id="bgImage3" class="bg-image-select">
              <option value="none">None</option>
              <option value="media/bg1.png">Background 1</option>
              <option value="media/bg2.png">Background 2</option>
              <option value="media/bg3.png">Background 3</option>
              <option value="media/bg4.png">Background 4</option>
              <option value="media/bg5.png">Background 5</option>
            </select>
          </div>
          <div class="image-selector">
            <label>Image 4 - Bottom Right</label>
            <select id="bgImage4" class="bg-image-select">
              <option value="none">None</option>
              <option value="media/bg1.png">Background 1</option>
              <option value="media/bg2.png">Background 2</option>
              <option value="media/bg3.png">Background 3</option>
              <option value="media/bg4.png">Background 4</option>
              <option value="media/bg5.png">Background 5</option>
            </select>
          </div>
          <div class="image-selector">
            <label>Image 5 - Bottom Left</label>
            <select id="bgImage5" class="bg-image-select">
              <option value="none">None</option>
              <option value="media/bg1.png">Background 1</option>
              <option value="media/bg2.png">Background 2</option>
              <option value="media/bg3.png">Background 3</option>
              <option value="media/bg4.png">Background 4</option>
              <option value="media/bg5.png">Background 5</option>
            </select>
          </div>
        </div>
      </div>

      <div class="footer-actions">
        <button class="btn btn-image" id="imageBtn">Save as Image</button>
      </div>
    </div>

    <div class="site-footer"><span>@badger.exe</span></div>

    <script src="script.js"></script>
  </body>
</html>
